<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gomoku - Interface Graphique</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; padding: 20px; color: #333; }
        .main-container { display: flex; gap: 30px; max-width: 1200px; margin: 0 auto; align-items: flex-start; }
        .panel { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        h1 { font-size: 24px; margin-top: 0; }
        .status { padding: 10px; border-radius: 4px; margin-bottom: 20px; font-weight: bold; text-align: center; }
        .connected { background-color: #d4edda; color: #155724; }
        .disconnected { background-color: #f8d7da; color: #721c24; }
        
        /* Contrôles & Stats */
        .controls { display: flex; gap: 10px; margin-bottom: 20px; align-items: center; flex-wrap: wrap; }
        input, select, button { padding: 10px; font-size: 14px; }
        button { background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        .stats { display: flex; justify-content: space-between; margin-bottom: 20px; font-weight: bold; }

        /* Le Plateau (Board) */
        #board-wrapper { position: relative; padding: 20px; background-color: #DEB887; border: 4px solid #8B4513; border-radius: 4px; box-shadow: inset 0 0 10px rgba(0,0,0,0.3); }
        #board {
            display: grid;
            grid-template-columns: repeat(19, 30px);
            grid-template-rows: repeat(19, 30px);
            gap: 0;
            background-color: transparent;
        }
        
        /* Les cases (intersections) */
        .cell {
            width: 30px;
            height: 30px;
            border: 1px solid #cdaf82; /* Lignes de la grille */
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
        }
        .cell:hover { background-color: rgba(255, 255, 255, 0.3); }

        /* Les pions */
        .piece { width: 24px; height: 24px; border-radius: 50%; box-shadow: 2px 2px 4px rgba(0,0,0,0.5); position: absolute; }
        .piece-1 { background-color: #111; border: 1px solid #000; } /* Noir */
        .piece-2 { background-color: #eee; border: 1px solid #ccc; } /* Blanc */

        /* Logs */
        pre { background: #2d2d2d; color: #4af626; padding: 15px; border-radius: 4px; overflow-x: auto; height: 400px; margin: 0; font-size: 12px; }
        .logs-panel { flex: 1; min-width: 300px; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="panel">
        <h1>Gomoku</h1>
        <div id="status" class="status disconnected">🔴 Déconnecté</div>

        <div class="stats">
            <div>Captures Noir : <span id="capBlack">0</span></div>
            <div>Captures Blanc : <span id="capWhite">0</span></div>
        </div>

        <div class="controls">
            <label>Couleur à jouer : </label>
            <select id="colorSelect">
                <option value="1">Noir (1)</option>
                <option value="2">Blanc (2)</option>
            </select>
            |
            <input type="text" id="coordInput" placeholder="Ex: H8" maxlength="3" size="5">
            <button onclick="sendManualMove()">Jouer (Manuel)</button>
        </div>

        <div id="board-wrapper">
            <div id="board"></div>
        </div>
    </div>

    <div class="panel logs-panel">
        <h3 style="margin-top: 0;">Console Serveur</h3>
        <pre id="logs">En attente de connexion...</pre>
    </div>
</div>

<script>
    // --- 1. GÉNÉRATION DU PLATEAU VISUEL ---
    const boardDiv = document.getElementById("board");
    const cells = {}; // Pour retrouver facilement une case HTML via sa coordonnée (ex: cells["H8"])

    // Génération des 19x19 cases
    for (let r = 0; r < 19; r++) {
        for (let c = 0; c < 19; c++) {
            const cell = document.createElement("div");
            cell.className = "cell";
            
            // Calcul de la coordonnée (ex: r=7, c=7 -> H8)
            const letter = String.fromCharCode(65 + c);
            const number = r + 1;
            const coord = `${letter}${number}`;
            
            cell.id = `cell-${coord}`;
            
            // Événement au clic sur la grille
            cell.onclick = () => sendMove(coord);
            
            boardDiv.appendChild(cell);
            cells[coord] = cell; // On stocke la réf
        }
    }

    // --- 2. WEBSOCKET ---
    const ws = new WebSocket("ws://localhost:8000/ws/gomoku");
    const statusDiv = document.getElementById("status");
    const logsPre = document.getElementById("logs");

    ws.onopen = function(event) {
        statusDiv.textContent = "🟢 Connecté à FastAPI";
        statusDiv.className = "status connected";
        logToScreen("Système : Connecté.");
    };

    ws.onmessage = function(event) {
        const data = JSON.parse(event.data);
        logToScreen("Serveur : " + JSON.stringify(data));

        // Mise à jour des captures
        if (data.captures_black !== undefined) document.getElementById("capBlack").innerText = data.captures_black;
        if (data.captures_white !== undefined) document.getElementById("capWhite").innerText = data.captures_white;

        // Si le serveur a validé le coup, on l'affiche
        if (data.status === "success" && data.coord && data.color) {
            placePiece(data.coord, data.color);
        }

        // --- GESTION DES CAPTURES ---
        // Idéalement, si ton serveur renvoie le plateau entier (data.board), 
        // tu devrais appeler une fonction drawFullBoard(data.board) ici 
        // pour que les pions capturés disparaissent visuellement !
        if (data.board) {
            drawFullBoard(data.board);
        }

        if (data.winner > 0) {
            alert(`Victoire du joueur ${data.winner === 1 ? 'Noir' : 'Blanc'} !`);
        } else if (data.status === "forbidden") {
            alert(`Coup interdit : ${data.reason}`);
        }
    };

    ws.onclose = function(event) {
        statusDiv.textContent = "🔴 Déconnecté";
        statusDiv.className = "status disconnected";
        logToScreen("Système : Connexion perdue.");
    };

    // --- 3. FONCTIONS D'ACTION ---

    // Envoyer un coup en cliquant sur la grille
    function sendMove(coord) {
        const color = parseInt(document.getElementById("colorSelect").value);
        const payload = { coord: coord, color: color };
        ws.send(JSON.stringify(payload));
        logToScreen(`Client : Clic sur ${coord} (Joueur ${color})`);
    }

    // Envoyer un coup via le champ texte (pour debug)
    function sendManualMove() {
        const coord = document.getElementById("coordInput").value.toUpperCase();
        if (coord) {
            sendMove(coord);
            document.getElementById("coordInput").value = "";
        }
    }

    // Ajouter un pion visuellement
    function placePiece(coord, color) {
        const cell = cells[coord];
        if (cell) {
            cell.innerHTML = ""; // On vide la case (au cas où)
            const piece = document.createElement("div");
            piece.className = `piece piece-${color}`;
            cell.appendChild(piece);
        }
    }

    // Mettre à jour TOUT le plateau (Si le serveur Python t'envoie la matrice complète)
    function drawFullBoard(boardMatrix) {
        for (let r = 0; r < 19; r++) {
            for (let c = 0; c < 19; c++) {
                const letter = String.fromCharCode(65 + c);
                const coord = `${letter}${r + 1}`;
                const cell = cells[coord];
                
                cell.innerHTML = ""; // On nettoie la case
                
                const pieceColor = boardMatrix[r][c];
                if (pieceColor !== 0) {
                    const piece = document.createElement("div");
                    piece.className = `piece piece-${pieceColor}`;
                    cell.appendChild(piece);
                }
            }
        }
    }

    function logToScreen(message) {
        logsPre.textContent = message + "\n\n" + logsPre.textContent;
    }
</script>

</body>
</html>
